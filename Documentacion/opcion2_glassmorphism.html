<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opción 2 - Glassmorphism</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { 
            font-family: 'Poppins', sans-serif; 
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            background-image: radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%), radial-gradient(at 100% 0%, hsla(339,49%,30%,1) 0, transparent 50%);
            min-height: 100vh;
            color: #fff;
        }
        .glass-nav {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            color: white;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }
        .table { color: white; }
        .table-hover tbody tr:hover { color: #fff; background-color: rgba(255,255,255,0.1); }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark glass-nav mb-5 py-3">
        <div class="container">
            <a class="navbar-brand fw-bold fs-4" href="#"><i class="bi bi-pc-display me-2"></i>TechHelp</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item"><a class="nav-link text-white fw-medium" href="#">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link text-white fw-medium" href="#">Mis Solicitudes</a></li>
                    <li class="nav-item ms-3">
                        <a class="btn btn-light rounded-pill px-4 fw-bold text-dark" href="#">Salir</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container pb-5">
        <div class="row g-4 mb-4">
            <div class="col-md-12">
                <div class="glass-card p-5 text-center">
                    <h2 class="fw-bold mb-3">Bienvenido, Usuario</h2>
                    <p class="lead mb-0 opacity-75">Gestiona tus solicitudes de soporte con nuestra nueva interfaz fluida.</p>
                </div>
            </div>
        </div>
        <div class="row g-4">
            <div class="col-md-12">
                <div class="glass-card p-4">
                    <h4 class="fw-bold mb-4">Mis Solicitudes</h4>
                    <table class="table table-borderless table-hover">
                        <thead class="border-bottom border-light border-opacity-25 text-white-50">
                            <tr>
                                <th>#</th>
                                <th>Asunto</th>
                                <th>Estado</th>
                                <th>Acción</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>001</td>
                                <td>Fallo de hardware</td>
                                <td><span class="badge bg-danger rounded-pill px-3">Crítico</span></td>
                                <td><button class="btn btn-sm btn-light rounded-pill">Ver Detalle</button></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
