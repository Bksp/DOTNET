<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opción 3 - Soft UI / Minimalista</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #fafbfe;
            color: #333;
        }
        .navbar-custom {
            background-color: transparent;
            padding: 2rem 0;
        }
        .navbar-custom .nav-link {
            color: #556080;
            font-weight: 500;
            padding: 0.5rem 1.2rem;
            border-radius: 8px;
            transition: all 0.2s;
        }
        .navbar-custom .nav-link:hover, .navbar-custom .nav-link.active {
            background-color: #eef1f6;
            color: #1a1c23;
        }
        .navbar-brand {
            color: #1a1c23;
            font-weight: 800;
            font-size: 1.5rem;
            letter-spacing: -0.5px;
        }
        .soft-card {
            background: #ffffff;
            border: 1px solid #eef1f6;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.02);
            padding: 2rem;
        }
        .btn-primary-custom {
            background-color: #1a1c23;
            color: white;
            border: none;
            border-radius: 12px;
            padding: 10px 24px;
            font-weight: 500;
        }
        .btn-primary-custom:hover {
            background-color: #333642;
        }
        .badge-soft {
            background-color: #eef1f6;
            color: #556080;
            font-weight: 500;
            padding: 0.5em 1em;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-custom container">
        <a class="navbar-brand" href="#">
            <div class="d-flex align-items-center">
                <div class="bg-dark text-white rounded-circle d-flex justify-content-center align-items-center me-2" style="width: 40px; height: 40px;">
                    <i class="bi bi-pc-display"></i>
                </div>
                TechHelp
            </div>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav mx-auto">
                <li class="nav-item"><a class="nav-link active" href="#">Inicio</a></li>
                <li class="nav-item"><a class="nav-link" href="#">Mis Solicitudes</a></li>
                <li class="nav-item"><a class="nav-link" href="#">Perfil</a></li>
            </ul>
            <button class="btn btn-outline-danger rounded-pill px-4">Salir</button>
        </div>
    </nav>

    <div class="container py-4">
        <div class="d-flex justify-content-between align-items-end mb-5">
            <div>
                <h1 class="fw-bold mb-2" style="letter-spacing: -1px;">Mis Solicitudes</h1>
                <p class="text-muted">Gestiona y revisa el estado de tus tickets de soporte.</p>
            </div>
            <button class="btn btn-primary-custom"><i class="bi bi-plus-lg me-2"></i>Nueva Solicitud</button>
        </div>

        <div class="soft-card">
            <table class="table table-borderless align-middle">
                <thead>
                    <tr class="text-muted" style="font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px;">
                        <th class="pb-3">ID Ticket</th>
                        <th class="pb-3">Asunto</th>
                        <th class="pb-3">Estado</th>
                        <th class="pb-3 text-end">Acción</th>
                    </tr>
                </thead>
                <tbody>
                    <tr class="border-bottom border-light">
                        <td class="py-3 fw-medium">#1042</td>
                        <td class="py-3 text-dark">Actualización de Software</td>
                        <td class="py-3"><span class="badge-soft">En Progreso</span></td>
                        <td class="py-3 text-end"><a href="#" class="text-decoration-none text-primary fw-medium">Detalles <i class="bi bi-arrow-right-short"></i></a></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
